<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent — Mariam</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --surface:    rgba(255, 240, 245, 0.72);
            --border:     rgba(220, 100, 130, 0.28);
            --text:       #5a1a2e;
            --text-muted: #8b3a52;
            --text-soft:  rgba(255,220,230,0.92);
            --accent:     #e0426e;
            --accent2:    #ff8fab;
            --nav-bg:     rgba(180, 50, 85, 0.82);
            --green:      #16a34a;
            --trans:      0.3s cubic-bezier(.4,0,.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }

        /* Blurred background — same as index.html */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('love.jpg') center center / cover no-repeat;
            filter: blur(6px) brightness(0.78);
            transform: scale(1.05);
            z-index: -1;
        }

        /* Warm romantic overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(180,30,70,0.22) 0%, rgba(255,100,140,0.10) 100%);
            z-index: -1;
        }

        a { text-decoration: none; transition: var(--trans); }

        /* ── FLOATING HEARTS (same as index) ── */
        .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .heart  { position: absolute; bottom: -40px; animation: floatUp linear infinite; opacity: 0; }
        .heart:nth-child(1) { left: 7%;  animation-duration: 7s;   animation-delay: 0s;   font-size: 1rem; }
        .heart:nth-child(2) { left: 22%; animation-duration: 9s;   animation-delay: 2s;   font-size: 1.4rem; }
        .heart:nth-child(3) { left: 38%; animation-duration: 6s;   animation-delay: 1s;   font-size: .9rem; }
        .heart:nth-child(4) { left: 55%; animation-duration: 8s;   animation-delay: 3.5s; font-size: 1.3rem; }
        .heart:nth-child(5) { left: 72%; animation-duration: 7.5s; animation-delay: 0.5s; font-size: 1.1rem; }
        .heart:nth-child(6) { left: 88%; animation-duration: 10s;  animation-delay: 1.8s; font-size: .85rem; }

        @keyframes floatUp {
            0%   { transform: translateY(0) scale(0.6); opacity: 0; }
            10%  { opacity: 0.65; }
            90%  { opacity: 0.35; }
            100% { transform: translateY(-100vh) scale(1.1); opacity: 0; }
        }

        /* ── CARD ── */
        .card {
            position: relative; z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 56px 48px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 48px rgba(180,40,80,.22), inset 0 1px 0 rgba(255,255,255,.9);
            max-width: 460px; width: 100%;
            text-align: center;
            animation: popUp .7s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(.88) translateY(30px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ── CHECK ICON ── */
        .check-wrap {
            display: flex; justify-content: center; margin-bottom: 28px;
            animation: popUp .6s .15s cubic-bezier(.34,1.56,.64,1) both;
        }
        .check-ring {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(224,66,110,.15), rgba(224,66,110,.08));
            border: 2px solid rgba(224,66,110,.35);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .check-ring::before {
            content: '';
            position: absolute; inset: -6px; border-radius: 50%;
            border: 2px solid rgba(224,66,110,.18);
            animation: pulse-ring 2s ease-out infinite;
        }
        .check-ring::after {
            content: '';
            position: absolute; inset: -12px; border-radius: 50%;
            border: 1.5px solid rgba(224,66,110,.09);
            animation: pulse-ring 2s .4s ease-out infinite;
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .check-icon {
            font-size: 2.2rem; color: var(--accent);
            animation: checkBounce .5s .4s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes checkBounce {
            from { transform: scale(0) rotate(-15deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* ── TEXT ── */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.95rem; font-weight: 800;
            letter-spacing: -.03em;
            color: #fff;
            text-shadow: 0 2px 18px rgba(180,30,70,0.6);
            line-height: 1.2; margin-bottom: 12px;
            animation: fadeUp .5s .35s ease both;
        }
        .main-title span { color: var(--accent2); text-shadow: 0 2px 20px rgba(255,100,140,0.75); }

        .main-desc {
            font-size: .9rem; color: var(--text-muted);
            line-height: 1.7; font-weight: 300;
            margin-bottom: 32px;
            animation: fadeUp .5s .45s ease both;
        }
        .main-desc strong { color: var(--accent); font-weight: 600; }

        /* ── BUTTONS ── */
        .btn-group {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            animation: fadeUp .5s .55s ease both;
        }

        .btn-primary {
            display: inline-flex; align-items: center; gap: 9px;
            background: linear-gradient(135deg, #c0254f, #e8537a, #ff8fab);
            color: #fff; border: none; border-radius: 12px;
            padding: 13px 28px; font-size: .88rem; font-weight: 700;
            font-family: 'Poppins', sans-serif; cursor: pointer;
            box-shadow: 0 4px 22px rgba(200,40,90,.42);
            transition: var(--trans);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(200,40,90,.58); }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            display: inline-flex; align-items: center; gap: 9px;
            background: rgba(255,240,245,.6);
            color: var(--accent);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 13px 24px; font-size: .88rem; font-weight: 600;
            font-family: 'Poppins', sans-serif; cursor: pointer;
            backdrop-filter: blur(8px); transition: var(--trans);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.9); border-color: var(--accent); transform: translateY(-3px); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .card { padding: 40px 24px; border-radius: 22px; }
            .main-title { font-size: 1.5rem; }
            .btn-group { flex-direction: column; }
            .btn-primary, .btn-secondary { justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Floating hearts — identical to index.html -->
    <div class="hearts">
        <span class="heart">🩷</span>
        <span class="heart">💕</span>
        <span class="heart">🤍</span>
        <span class="heart">💗</span>
        <span class="heart">🩷</span>
        <span class="heart">💖</span>
    </div>

    <div class="card">

        <div class="check-wrap">
            <div class="check-ring">
                <i class="fas fa-heart check-icon"></i>
            </div>
        </div>

        <div class="main-title">Message <span>Sent!</span> 💌</div>

        <div class="main-desc">
            Got your message… I’ve received it and I’m reading it properly. 
            <br>Don’t worry, I’ll get back to you soon 😉
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            
        </div>

    </div>
</body>
</html>
