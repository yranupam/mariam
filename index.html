<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Mariam</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --surface:    rgba(255, 240, 245, 0.72);
            --border:     rgba(220, 100, 130, 0.28);
            --text:       #5a1a2e;
            --text-muted: #8b3a52;
            --text-soft:  rgba(255,220,230,0.92);
            --accent:     #e0426e;
            --accent2:    #ff8fab;
            --nav-bg:     rgba(180, 50, 85, 0.82);
            --trans:      0.3s cubic-bezier(.4,0,.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 60px;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('love.jpg') center center / cover no-repeat;
            filter: blur(6px) brightness(0.78);
            transform: scale(1.05);
            z-index: -1;
        }

        /* warm romantic overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, rgba(180,30,70,0.22) 0%, rgba(255,100,140,0.10) 100%);
            z-index: -1;
        }

        /* floating hearts */
        .hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .heart { position: absolute; bottom: -40px; animation: floatUp linear infinite; opacity: 0; }
        .heart:nth-child(1) { left: 7%;  animation-duration: 7s;   animation-delay: 0s;   font-size: 1rem; }
        .heart:nth-child(2) { left: 22%; animation-duration: 9s;   animation-delay: 2s;   font-size: 1.4rem; }
        .heart:nth-child(3) { left: 38%; animation-duration: 6s;   animation-delay: 1s;   font-size: .9rem; }
        .heart:nth-child(4) { left: 55%; animation-duration: 8s;   animation-delay: 3.5s; font-size: 1.3rem; }
        .heart:nth-child(5) { left: 72%; animation-duration: 7.5s; animation-delay: 0.5s; font-size: 1.1rem; }
        .heart:nth-child(6) { left: 88%; animation-duration: 10s;  animation-delay: 1.8s; font-size: .85rem; }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(0.6); opacity: 0; }
            10%  { opacity: 0.65; }
            90%  { opacity: 0.35; }
            100% { transform: translateY(-100vh) scale(1.1); opacity: 0; }
        }

        a { text-decoration: none; transition: var(--trans); }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; height: 50px; background: var(--nav-bg);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0;
            z-index: 1000; border-bottom: 1px solid var(--border);
            transition: top 0.3s ease;
        }
        .navbar-hidden { top: -60px; }
        .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; color: #064e3b; }
        .logo span { color: #fff; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.6); border: 1px solid rgba(255,255,255,.65);
            border-radius: 20px; padding: 6px 16px;
            font-size: .8rem; font-weight: 600; color: #064e3b;
            backdrop-filter: blur(8px); transition: var(--trans);
        }
        .back-btn:hover { background: rgba(255,255,255,.9); }

        /* --- PAGE WRAPPER --- */
        .page {
            width: 100%; max-width: 560px;
            display: flex; flex-direction: column; gap: 0;
            animation: fadeUp .65s ease both;
            position: relative; z-index: 1;
        }

        /* --- TOP SECTION --- */
        .top-badge { text-align: center; margin-bottom: 28px; }
        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem; font-weight: 800;
            letter-spacing: -.02em; color: #fff;
            text-shadow: 0 2px 18px rgba(180,30,70,0.6);
            line-height: 1.15; margin-bottom: 12px;
        }
        .page-title span { color: var(--accent2); text-shadow: 0 2px 20px rgba(255,100,140,0.75); }
        .page-sub { font-size: .88rem; color: var(--text-soft); font-weight: 300; line-height: 1.7; text-shadow: 0 1px 6px rgba(0,0,0,0.3); }

        /* --- FORM CARD --- */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 38px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 48px rgba(180,40,80,.22), inset 0 1px 0 rgba(255,255,255,.9);
        }

        /* --- FORM GROUPS --- */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: flex; align-items: center; gap: 7px;
            font-size: .78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .06em;
            color: var(--text-muted); margin-bottom: 8px;
        }
        .form-group label i { color: var(--accent); font-size: .8rem; }

        .form-group input,
        .form-group textarea {
            width: 100%; padding: 13px 16px;
            background: rgba(255,245,248,.8);
            border: 1.5px solid rgba(220,100,130,.3);
            border-radius: 10px;
            font-size: .9rem; font-family: 'Poppins', sans-serif;
            color: var(--text); outline: none;
            transition: border-color var(--trans), box-shadow var(--trans), background var(--trans);
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: #d4849e; }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,.97);
            box-shadow: 0 0 0 4px rgba(224,66,110,.15);
        }

        .form-group textarea { resize: vertical; min-height: 130px; line-height: 1.6; }

        .required { color: var(--accent); margin-left: 2px; }

        /* --- INPUT ROW --- */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* --- SUBMIT --- */
        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #c0254f, #e8537a, #ff8fab);
            color: #fff; border: none; border-radius: 12px;
            font-size: .95rem; font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer; letter-spacing: .04em;
            transition: var(--trans);
            box-shadow: 0 4px 22px rgba(200,40,90,.42);
            display: flex; align-items: center; justify-content: center; gap: 9px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,40,90,.58); }
        .submit-btn:active { transform: translateY(0); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            .form-card { padding: 26px 20px; }
            .input-row { grid-template-columns: 1fr; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="hearts">
        <span class="heart">🩷</span>
        <span class="heart">💕</span>
        <span class="heart">🤍</span>
        <span class="heart">💗</span>
        <span class="heart">🩷</span>
        <span class="heart">💖</span>
    </div>

    <div class="page">

        <div class="top-badge">
            <div class="page-title">Say <span>Hello</span> 👋</div>
            <div class="page-sub">You're not just a crush anymore, you feel like something deeper I can't ignore.
Maybe it's too soon, but it feels a lot like love.</div>
        </div>

        <div class="form-card">
            <form action="https://formsubmit.co/pkcsbd4@gmail.com" method="POST">

                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="New message from munan07.github.io!">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_next" value="https://abamunan.github.io/firstweb/contactRep.html">

                <div class="input-row">
                    
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email <span style="font-weight:300;text-transform:none;letter-spacing:0;font-size:.72rem;">(optional)</span></label>
                        <input type="email" id="email" name="email" placeholder="you@example.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone <span style="font-weight:300;text-transform:none;letter-spacing:0;font-size:.72rem;">(optional)</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="+880 1XXX-XXXXXX">
                </div>

                <div class="form-group">
                    <label for="message"><i class="fas fa-comment-dots"></i> Message <span class="required">*</span></label>
                    <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>

            </form>
        </div>

    </div>

</body>
</html>
